<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Shop 后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f6fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .sidebar {
            background: #1a1a2e;
            min-height: 100vh;
            padding-top: 20px;
        }
        .sidebar .nav-link {
            color: #a0a0b8;
            padding: 12px 20px;
            border-radius: 8px;
            margin: 2px 10px;
            transition: all 0.2s;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }
        .sidebar .nav-link i { margin-right: 10px; width: 20px; text-align: center; }
        .sidebar .brand {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-2px); }
        .stat-card .number { font-size: 2rem; font-weight: 700; }
        .stat-card .label { color: #6c757d; font-size: 0.9rem; }
        .stat-card .icon { font-size: 2.5rem; opacity: 0.2; position: absolute; right: 20px; top: 20px; }
        .main-content { padding: 30px; }
        .page-title { margin-bottom: 25px; }
        .page-title h2 { font-weight: 600; }
        .badge-status { font-size: 0.8rem; padding: 4px 10px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 sidebar p-0 d-none d-md-block">
                <div class="brand">📊 TK 后台</div>
                <nav class="nav flex-column">
                    <a class="nav-link active" href="/" onclick="return loadPage('dashboard')">
                        📈 仪表盘
                    </a>
                    <a class="nav-link" href="/orders" onclick="return loadPage('orders')">
                        📦 订单管理
                    </a>
                    <a class="nav-link" href="/products" onclick="return loadPage('products')">
                        🏷️ 商品管理
                    </a>
                    <a class="nav-link" href="#" onclick="return false">
                        📊 数据分析
                    </a>
                    <a class="nav-link" href="#" onclick="return false">
                        ⚙️ 设置
                    </a>
                </nav>
            </div>

            <!-- 主内容 -->
            <div class="col-md-10 main-content" id="mainContent">
                <!-- 页面由 JS 动态加载 -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ── 页面加载 ──
        function loadPage(page) {
            const content = document.getElementById('mainContent');
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(l => l.classList.remove('active'));
            event.target.classList.add('active');

            switch(page) {
                case 'dashboard': renderDashboard(content); break;
                case 'orders': renderOrders(content); break;
                case 'products': renderProducts(content); break;
            }
            return false;
        }

        // ── 仪表盘 ──
        async function renderDashboard(el) {
            el.innerHTML = `
                <div class="page-title">
                    <h2>📈 仪表盘</h2>
                    <p class="text-muted">店铺概览</p>
                </div>
                <div class="row g-4" id="statsRow">
                    <div class="col-md-3">
                        <div class="card stat-card p-4 position-relative">
                            <div class="icon">📦</div>
                            <div class="label">今日订单</div>
                            <div class="number" id="todayOrders">-</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card p-4 position-relative">
                            <div class="icon">💰</div>
                            <div class="label">今日销售额</div>
                            <div class="number" id="todaySales">-</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card p-4 position-relative">
                            <div class="icon">🏷️</div>
                            <div class="label">在售商品</div>
                            <div class="number" id="totalProducts">-</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card p-4 position-relative">
                            <div class="icon">⏳</div>
                            <div class="label">待处理</div>
                            <div class="number" id="pendingOrders">-</div>
                        </div>
                    </div>
                </div>
                <div class="row mt-4">
                    <div class="col-md-8">
                        <div class="card p-4">
                            <h5>最近订单</h5>
                            <div id="recentOrdersTable">
                                <p class="text-muted">加载中...</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card p-4">
                            <h5>快速操作</h5>
                            <div class="d-grid gap-2 mt-3">
                                <button class="btn btn-outline-primary" onclick="loadPage('orders')">📦 查看订单</button>
                                <button class="btn btn-outline-success" onclick="loadPage('products')">🏷️ 管理商品</button>
                                <button class="btn btn-outline-info" onclick="refreshStats()">🔄 刷新数据</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            await refreshStats();
        }

        async function refreshStats() {
            try {
                // 获取今日订单
                const ordersRes = await fetch('/api/orders?days=1');
                const ordersData = await ordersRes.json();
                const orders = ordersData.data?.orders || [];
                document.getElementById('todayOrders').textContent = orders.length;

                // 获取商品数
                const prodRes = await fetch('/api/products');
                const prodData = await prodRes.json();
                const total = prodData.data?.total || prodData.data?.products?.length || '-';
                document.getElementById('totalProducts').textContent = total;

                // 最近订单表格
                const tableEl = document.getElementById('recentOrdersTable');
                if (orders.length === 0) {
                    tableEl.innerHTML = '<p class="text-muted">暂无订单数据（API 凭证配置后生效）</p>';
                } else {
                    let html = `<table class="table table-sm"><thead><tr>
                        <th>订单号</th><th>金额</th><th>状态</th><th>时间</th>
                    </tr></thead><tbody>`;
                    orders.slice(0, 10).forEach(o => {
                        const status = o.status || 'unknown';
                        const badge = status === 'completed' ? 'success' : status === 'pending' ? 'warning' : 'secondary';
                        html += `<tr>
                            <td><small>${o.id || o.order_id || '-'}</small></td>
                            <td>$${o.total_amount || o.payment_amount || '-'}</td>
                            <td><span class="badge bg-${badge}">${status}</span></td>
                            <td><small>${o.create_time || '-'}</small></td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                    tableEl.innerHTML = html;
                }
            } catch(e) {
                console.error('加载失败:', e);
            }
        }

        // ── 订单页面 ──
        async function renderOrders(el) {
            el.innerHTML = `
                <div class="page-title d-flex justify-content-between align-items-center">
                    <div>
                        <h2>📦 订单管理</h2>
                        <p class="text-muted">查看和管理店铺订单</p>
                    </div>
                    <div>
                        <select class="form-select form-select-sm d-inline-block w-auto" id="orderDays" onchange="loadOrders()">
                            <option value="1">今天</option>
                            <option value="3" selected>最近3天</option>
                            <option value="7">最近7天</option>
                            <option value="30">最近30天</option>
                        </select>
                        <button class="btn btn-sm btn-primary ms-2" onclick="loadOrders()">🔄 刷新</button>
                    </div>
                </div>
                <div class="card p-3">
                    <div id="ordersTable"><p class="text-muted">加载中...</p></div>
                </div>
            `;
            await loadOrders();
        }

        async function loadOrders() {
            const days = document.getElementById('orderDays')?.value || 3;
            const tableEl = document.getElementById('ordersTable');
            if (!tableEl) return;
            tableEl.innerHTML = '<p class="text-muted">加载中...</p>';

            try {
                const res = await fetch(`/api/orders?days=${days}`);
                const data = await res.json();
                const orders = data.data?.orders || [];

                if (orders.length === 0) {
                    tableEl.innerHTML = '<p class="text-muted">暂无订单（配置 API 凭证后显示）</p>';
                    return;
                }

                let html = `<div class="table-responsive"><table class="table table-hover"><thead><tr>
                    <th>订单号</th><th>商品</th><th>金额</th><th>状态</th><th>时间</th><th>操作</th>
                </tr></thead><tbody>`;
                orders.forEach(o => {
                    const status = o.status || 'unknown';
                    const badge = status === 'completed' ? 'success' : status === 'pending' ? 'warning' : 'secondary';
                    html += `<tr>
                        <td><small>${o.id || o.order_id || '-'}</small></td>
                        <td>${o.product_name || '-'}</td>
                        <td>$${o.total_amount || o.payment_amount || '-'}</td>
                        <td><span class="badge bg-${badge} badge-status">${status}</span></td>
                        <td><small>${o.create_time || '-'}</small></td>
                        <td><button class="btn btn-sm btn-outline-secondary">查看</button></td>
                    </tr>`;
                });
                html += '</tbody></table></div>';
                tableEl.innerHTML = html;
            } catch(e) {
                tableEl.innerHTML = '<p class="text-danger">加载失败: ' + e.message + '</p>';
            }
        }

        // ── 商品页面 ──
        async function renderProducts(el) {
            el.innerHTML = `
                <div class="page-title d-flex justify-content-between align-items-center">
                    <div>
                        <h2>🏷️ 商品管理</h2>
                        <p class="text-muted">查看和管理店铺商品</p>
                    </div>
                    <button class="btn btn-sm btn-primary" onclick="loadProducts()">🔄 刷新</button>
                </div>
                <div class="card p-3">
                    <div id="productsTable"><p class="text-muted">加载中...</p></div>
                </div>
            `;
            await loadProducts();
        }

        async function loadProducts() {
            const tableEl = document.getElementById('productsTable');
            if (!tableEl) return;
            tableEl.innerHTML = '<p class="text-muted">加载中...</p>';

            try {
                const res = await fetch('/api/products');
                const data = await res.json();
                const products = data.data?.products || [];

                if (products.length === 0) {
                    tableEl.innerHTML = '<p class="text-muted">暂无商品（配置 API 凭证后显示）</p>';
                    return;
                }

                let html = `<div class="table-responsive"><table class="table table-hover"><thead><tr>
                    <th>商品名</th><th>价格</th><th>库存</th><th>状态</th><th>操作</th>
                </tr></thead><tbody>`;
                products.forEach(p => {
                    const status = p.status || 'active';
                    const badge = status === 'active' ? 'success' : 'secondary';
                    html += `<tr>
                        <td>${p.product_name || p.name || '-'}</td>
                        <td>$${p.price || p.sales_price || '-'}</td>
                        <td>${p.stock || p.quantity || '-'}</td>
                        <td><span class="badge bg-${badge} badge-status">${status}</span></td>
                        <td><button class="btn btn-sm btn-outline-secondary">编辑</button></td>
                    </tr>`;
                });
                html += '</tbody></table></div>';
                tableEl.innerHTML = html;
            } catch(e) {
                tableEl.innerHTML = '<p class="text-danger">加载失败: ' + e.message + '</p>';
            }
        }

        // ── 启动 ──
        document.addEventListener('DOMContentLoaded', () => renderDashboard(document.getElementById('mainContent')));
    </script>
</body>
</html>
